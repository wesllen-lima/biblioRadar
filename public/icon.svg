<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="60%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="512" height="256" rx="108" fill="url(#shine)"/>

  <!-- Open book — pages -->
  <g transform="translate(256,248)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path d="M-110,-72 L-110,88 Q-110,96 -102,98 L-4,112 L-4,-88 Q-4,-96 -12,-98 L-102,-88 Q-110,-86 -110,-72 Z"
          fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.7)" stroke-width="6"/>
    <!-- Right page -->
    <path d="M110,-72 L110,88 Q110,96 102,98 L4,112 L4,-88 Q4,-96 12,-98 L102,-88 Q110,-86 110,-72 Z"
          fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.7)" stroke-width="6"/>
    <!-- Spine -->
    <line x1="0" y1="-92" x2="0" y2="116" stroke="rgba(255,255,255,0.9)" stroke-width="7"/>
    <!-- Left page lines -->
    <line x1="-88" y1="-28" x2="-20" y2="-20" stroke="rgba(255,255,255,0.55)" stroke-width="5"/>
    <line x1="-88" y1="8"  x2="-20" y2="16"  stroke="rgba(255,255,255,0.55)" stroke-width="5"/>
    <line x1="-88" y1="44" x2="-20" y2="52"  stroke="rgba(255,255,255,0.55)" stroke-width="5"/>
    <!-- Right page lines -->
    <line x1="88" y1="-28" x2="20" y2="-20" stroke="rgba(255,255,255,0.55)" stroke-width="5"/>
    <line x1="88" y1="8"   x2="20" y2="16"  stroke="rgba(255,255,255,0.55)" stroke-width="5"/>
    <line x1="88" y1="44"  x2="20" y2="52"  stroke="rgba(255,255,255,0.55)" stroke-width="5"/>
  </g>

  <!-- Radar arcs (top-right, small) -->
  <g transform="translate(362,148)" fill="none" stroke="white" stroke-linecap="round">
    <circle cx="0" cy="0" r="22" stroke-opacity="0.9" stroke-width="9"/>
    <circle cx="0" cy="0" r="44" stroke-opacity="0.55" stroke-width="7"/>
    <circle cx="0" cy="0" r="66" stroke-opacity="0.3"  stroke-width="5"/>
  </g>
</svg>
